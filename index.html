<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>みみぞの大冒険</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="bossHud" class="boss-hud hidden" aria-hidden="true">
      <span class="boss-hud-name">ねむけ大王</span>
      <div class="boss-hud-bar">
        <div id="bossHpFill" class="boss-hud-fill"></div>
      </div>
    </div>

    <div class="game-shell">
      <canvas id="gameCanvas" width="960" height="540"></canvas>

      <div id="hud" class="hud" aria-hidden="true">
        <div class="hud-left">
          <span class="hud-label">スコア</span>
          <span id="scoreDisplay" class="hud-value">0</span>
        </div>
        <div class="hud-center">
          <span id="stageName" class="stage-name">ステージ1：パステル草原</span>
        </div>
        <div class="hud-right">
          <span class="hud-label">ライフ</span>
          <span id="livesDisplay" class="hud-value lives">♥♥♥</span>
        </div>
      </div>

      <div id="overlay" class="overlay">
        <div class="overlay-card">
          <h1 id="overlayTitle">みみぞの大冒険</h1>
          <p id="overlayText">スペースキーまたはタップでスタート</p>
          <p class="overlay-hint pc-only">← → 移動　スペース ジャンプ　Z 攻撃</p>
        </div>
      </div>

    </div>

    <div id="touchControls" class="touch-controls" aria-hidden="true">
      <div class="touch-left">
        <button type="button" id="btnLeft" class="touch-btn" aria-label="左へ移動">◀</button>
        <button type="button" id="btnRight" class="touch-btn" aria-label="右へ移動">▶</button>
      </div>
      <div class="touch-right">
        <button type="button" id="btnAttack" class="touch-btn attack-btn" aria-label="攻撃">攻</button>
        <button type="button" id="btnJump" class="touch-btn jump-btn" aria-label="ジャンプ">★</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
